<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLOT MACHINE</title>

  <link href="https://fonts.googleapis.com/css2?family=Carattere&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>
<body>
  


<!------------------------------------------------------------------->

<!----- SLOT MACHINE ----->


<div class="unit">
  <div class="unit-inner">
    <div class="btn-container">
      <div class="active-btn-container">
        <div class="check-out">CHECK OUT</div>
        <div class="active-btn-wrapper">
          <div class="btn-insert">INSERT POINT</div>
          <div class="bet2x-wrapper">
            <div class="btn-bet2x">2X</div>
            <div class="btn-bet5x">5X</div>
            <div class="btn-bet5x">X</div>
          </div>
          
        </div>
      </div>
      
      <div class="point-wrapper">
        <div class="win-wrapper">
          <div class="win-text">WIN</div>
          <div class="win-point">0</div>
        </div>

        <div class="total-wrapper">
          <div class="total-text">TOTAL</div>
          <div class="total-point">0</div>
        </div>

        <div class="lost-wrapper">
          <div class="lost-text">LOST <span class="bet">BET</span></div>
          <div class="lost-point">0</div>
        </div>

        <div class="dept-wrapper lost-wrapper">
          <div class="lost-text dept-text">DEPT</div>
          <div class="dept-point">0</div>
        </div>
      </div>
    </div>

    <div class="machine-container">
      <main></main>
      <div id="spin">INSERT POINT TO PLAY</div>
    </div>
    
  </div>
</div>
<div class="untitled">
  <!-- <p class="untitled-img1">JackPot</p> -->
  <img src="img/d2.svg" class="untitled-img" alt="">
  <img src="img/d2.svg" class="untitled-img" alt="">
  <img src="img/d2.svg" class="untitled-img" alt="">
  <p class="black-layer"></p>
</div>


<!----------------------------------------------------------------------------->







































</body>
</html>
